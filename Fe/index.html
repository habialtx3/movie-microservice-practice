<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Streaming Gallery</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fff8ef;
      --text: #111111;
      --yellow: #ffd93d;
      --shadow: 8px 8px 0px #111;
      --border: 3px solid #111;
    }

    body {
      font-family: "Space Grotesk", sans-serif;

      background:
        radial-gradient(circle at top left, #ffe29f 0%, transparent 25%),
        radial-gradient(circle at bottom right, #b6f0ff 0%, transparent 25%),
        var(--bg);

      min-height: 100vh;
      padding: 40px 20px;
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .title {
      text-align: center;
      margin-bottom: 40px;
    }

    .title h1 {
      display: inline-block;
      font-size: clamp(2rem, 5vw, 4rem);
      background: var(--yellow);
      padding: 12px 24px;
      border-radius: 20px;
      border: var(--border);
      box-shadow: var(--shadow);
      transform: rotate(-1deg);
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }

    .movie-card {
      background: white;
      border: var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: 0.2s ease;
    }

    .movie-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 12px 12px 0px #111;
    }

    .movie-card:nth-child(4n+1) {
      background: #fff4d6;
    }

    .movie-card:nth-child(4n+2) {
      background: #ffe3f8;
    }

    .movie-card:nth-child(4n+3) {
      background: #e8fff0;
    }

    .movie-card:nth-child(4n+4) {
      background: #eaf2ff;
    }

    .movie-header {
      padding: 18px 20px;
      border-bottom: var(--border);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }

    .movie-title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .video-wrapper {
      padding: 16px;
    }

    video {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 18px;
      border: var(--border);
      background: black;
      object-fit: cover;
    }

    .loading,
    .error {
      padding: 40px;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .error {
      background: #ffb4b4;
      border: var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 600px) {
      body {
        padding: 24px 14px;
      }

      .movie-grid {
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      <h1>🎬 Movie Streaming Gallery</h1>
    </div>

    <div id="movieGrid" class="movie-grid">
      <div class="loading">Loading videos...</div>
    </div>

  </div>

  <script>
    const movieGrid = document.getElementById("movieGrid");

    async function loadMovies() {
      try {

        const response = await fetch(
          "http://localhost:8080/movie-info/list"
        );

        if (!response.ok) {
          throw new Error("Failed to fetch movie list");
        }

        const movies = await response.json();

        if (!movies.length) {
          movieGrid.innerHTML = `
            <div class="error">
              No videos available.
            </div>
          `;
          return;
        }

        movieGrid.innerHTML = "";

        movies.forEach(movie => {

          const card = document.createElement("div");
          card.className = "movie-card";

          card.innerHTML = `
            <div class="movie-header">
              <div class="movie-title">
                ${movie.name}
              </div>
            </div>

            <div class="video-wrapper">
              <video
                controls
                preload="metadata"
                muted
                playsinline
              >
                <source
                  src="http://localhost:8080/stream/with-id/${movie.id}"
                  type="video/mp4"
                >
              </video>
            </div>
          `;

          movieGrid.appendChild(card);

          const video = card.querySelector("video");

          // create thumbnail from second 2
          video.addEventListener("loadeddata", () => {

            if (video.duration > 2) {
              video.currentTime = 2;
            }

          });

          video.addEventListener("seeked", () => {

            try {

              const canvas = document.createElement("canvas");

              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;

              const ctx = canvas.getContext("2d");

              ctx.drawImage(
                video,
                0,
                0,
                canvas.width,
                canvas.height
              );

              const thumbnail = canvas.toDataURL("image/jpeg");

              // set poster thumbnail
              video.setAttribute("poster", thumbnail);

              // reset video to start
              video.currentTime = 0;

              // pause video
              video.pause();

            } catch (err) {

              console.log(
                "Thumbnail generation failed:",
                err
              );

            }

          }, { once: true });

        });

      } catch (error) {

        console.error(error);

        movieGrid.innerHTML = `
          <div class="error">
            Failed to load videos from API.
          </div>
        `;
      }
    }

    loadMovies();
  </script>

</body>
</html>
